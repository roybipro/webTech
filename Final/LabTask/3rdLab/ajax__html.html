<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Info App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 1rem;
        }

        main {
            padding: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: left;
        }

        footer {
            margin-top: 20px;
            padding: 10px;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Student Information</h1>
</header>

<main>
    <button id="loadBtn">Fetch Students</button>

    <section id="output"></section>
</main>

<footer>
    <p>© 2026 Student App</p>
</footer>

<script src="script.js"></script>

</body>
</html>
